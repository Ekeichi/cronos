# Templates de squelette hebdomadaire par phase ("squelette de coach", statique).
# Les duration_ratio d'une phase doivent sommer à ~1.0.
# Les d_plus_ratio d'une phase doivent sommer à ~1.0 (uniquement pertinent
# pour les slots qui portent du dénivelé : SL, COTES, parfois SEUIL en trail).

BASE:
  - role: EF
    day_position: 1
    priority: SOFT
    duration_ratio: 0.16
    d_plus_ratio: 0.0
    intensity_zone: "Z1"
    notes: "EF facile, terrain roulant"
  - role: SEUIL
    day_position: 2
    priority: HARD
    duration_ratio: 0.14
    d_plus_ratio: 0.10
    intensity_zone: "SV1-SV2"
    notes: "tempo continu 20-30min"
  - role: EF
    day_position: 3
    priority: SOFT
    duration_ratio: 0.14
    d_plus_ratio: 0.0
    intensity_zone: "Z1"
    notes: ""
  - role: COTES
    day_position: 4
    priority: HARD
    duration_ratio: 0.12
    d_plus_ratio: 0.25
    intensity_zone: "côtes courtes 10-15%"
    notes: "force/puissance, faible impact articulaire"
  - role: RENFO
    day_position: 5
    priority: MODERATE
    duration_ratio: 0.06
    d_plus_ratio: 0.0
    intensity_zone: ""
    notes: "excentrique + force max basse vitesse"
  - role: EF
    day_position: 5
    priority: SOFT
    duration_ratio: 0.10
    d_plus_ratio: 0.0
    intensity_zone: "Z1"
    notes: ""
  - role: SL
    day_position: 6
    priority: HARD
    duration_ratio: 0.24
    d_plus_ratio: 0.55
    intensity_zone: "Z1-Z2"
    notes: "D+ modéré, focus volume/déplétion"
  - role: RECUP
    day_position: 7
    priority: SOFT
    duration_ratio: 0.04
    d_plus_ratio: 0.0
    intensity_zone: "Z1"
    notes: "décrassage ou repos"

