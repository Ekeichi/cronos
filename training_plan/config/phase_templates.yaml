    intensity_zone: "Z1"
    notes: ""
  - role: SEUIL
    day_position: 2
    priority: HARD
    duration_ratio: 0.13
    d_plus_ratio: 0.15
    intensity_zone: "SV2"
    notes: "cruise intervals 5-10min, D+ intégré si possible"
  - role: EF
    day_position: 3
    priority: SOFT
    duration_ratio: 0.10
    d_plus_ratio: 0.0
    intensity_zone: "Z1"
    notes: ""
  - role: COTES
    day_position: 4
    priority: HARD
    duration_ratio: 0.13
    d_plus_ratio: 0.30
    intensity_zone: "côtes longues VAM cible"
