  - role: RENFO
    day_position: 5
    priority: MODERATE
    duration_ratio: 0.05
    d_plus_ratio: 0.0
    intensity_zone: ""
    notes: "excentrique prioritaire (prépa descente)"
  - role: EF
    day_position: 5
    priority: SOFT
    duration_ratio: 0.08
    d_plus_ratio: 0.0
    intensity_zone: "Z1"
    notes: ""
  - role: SL
